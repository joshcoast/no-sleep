<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Deep violet-to-indigo background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3B0764"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <!-- Mouse body gradient: bright top, slightly warm bottom -->
    <linearGradient id="mouseBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <!-- Glow filter on vibration arcs -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square (macOS icon shape) -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner highlight ring -->
  <rect x="14" y="14" width="996" height="996" rx="210" ry="210"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="18"/>

  <!-- ── Vibration arcs – LEFT side ── -->
  <!-- Arc L1 (closest, brightest) -->
  <path d="M 340 430 Q 295 515 340 600"
        stroke="rgba(196,181,253,0.90)" stroke-width="22"
        fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arc L2 -->
  <path d="M 285 400 Q 222 515 285 630"
        stroke="rgba(196,181,253,0.55)" stroke-width="18"
        fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arc L3 (furthest, faintest) -->
  <path d="M 228 368 Q 146 515 228 662"
        stroke="rgba(196,181,253,0.28)" stroke-width="14"
        fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- ── Vibration arcs – RIGHT side ── -->
  <path d="M 684 430 Q 729 515 684 600"
        stroke="rgba(196,181,253,0.90)" stroke-width="22"
        fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 739 400 Q 802 515 739 630"
        stroke="rgba(196,181,253,0.55)" stroke-width="18"
        fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 796 368 Q 878 515 796 662"
        stroke="rgba(196,181,253,0.28)" stroke-width="14"
        fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- ── Computer mouse body ── -->
  <!-- Drop shadow for depth -->
  <ellipse cx="518" cy="548" rx="158" ry="220"
           fill="rgba(0,0,0,0.25)"/>
  <!-- Main body -->
  <ellipse cx="512" cy="540" rx="158" ry="220"
           fill="url(#mouseBody)"/>

  <!-- Button divider line -->
  <line x1="512" y1="320" x2="512" y2="492"
        stroke="#7C3AED" stroke-width="4" stroke-linecap="round" opacity="0.55"/>

  <!-- Scroll wheel -->
  <rect x="490" y="358" width="44" height="78" rx="22"
        fill="#7C3AED" opacity="0.80"/>
  <!-- Scroll wheel highlight -->
  <rect x="495" y="363" width="18" height="28" rx="9"
        fill="rgba(255,255,255,0.45)"/>

  <!-- Subtle gloss overlay on mouse top-left -->
  <ellipse cx="468" cy="420" rx="68" ry="90"
           fill="rgba(255,255,255,0.15)" transform="rotate(-12,468,420)"/>
</svg>
